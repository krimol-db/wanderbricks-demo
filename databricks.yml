# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "wanderbricks_demo"

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The Unity Catalog catalog for pipeline output and dashboard queries
    default: deco_catalog
  schema:
    description: The Unity Catalog schema for pipeline output and dashboard queries
    default: default

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c69ca1f0-d421.staging.cloud.databricks.com
    variables:
      catalog: wanderbricks_demo
      schema: default

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://dbc-c69ca1f0-d421.staging.cloud.databricks.com
      # Use a stable shared deployment path for production artifacts.
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: wanderbricks_demo
      schema: default
    run_as:
      # Best practice for production is to run as a service principal instead of a personal user.
      service_principal_name: "00000000-1111-2222-3333-444444444444"
