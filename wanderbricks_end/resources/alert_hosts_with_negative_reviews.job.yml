resources:
  jobs:
    alert_hosts_with_negative_reviews:
      name: Alert Hosts with Negative Reviews
      description: Daily job to query property_sentiment_summary, flag at-risk properties with CRITICAL/WARNING severity, and output an alert report.
      queue:
        enabled: true
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      email_notifications:
        no_alert_for_skipped_runs: false
        on_failure:
          - ${var.job_notification_email}
      notification_settings:
        no_alert_for_canceled_runs: false
        no_alert_for_skipped_runs: false
      schedule:
        pause_status: UNPAUSED
        quartz_cron_expression: ${var.alert_hosts_negative_reviews_cron}
        timezone_id: ${var.alert_hosts_negative_reviews_timezone}
      tasks:
        - task_key: alert_negative_hosts
          notebook_task:
            notebook_path: ../src/alert_hosts_with_negative_reviews/WanderBricks Property Sentiment Alerts.ipynb
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              sentiment_summary_table: property_sentiment_summary
              alerts_table: property_sentiment_alerts
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
      timeout_seconds: 0
      webhook_notifications: {}
