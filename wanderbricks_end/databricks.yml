# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "wanderbricks_end"

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The Unity Catalog catalog for pipeline output and dashboard queries
    default: deco_catalog
  schema:
    description: The Unity Catalog schema for pipeline output and dashboard queries
    default: default
  source_catalog:
    description: The Unity Catalog catalog for shared source reference tables used by jobs
    default: samples
  source_schema:
    description: The Unity Catalog schema for shared source reference tables used by jobs
    default: wanderbricks
  job_notification_email:
    description: Email address for scheduled job failure notifications
    default: tanishq.maheshwari@databricks.com
  alert_hosts_negative_reviews_cron:
    description: Quartz cron schedule for the host alerting job
    default: 0 0 7 * * ? *
  alert_hosts_negative_reviews_timezone:
    description: Time zone for the host alerting job schedule
    default: UTC

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-deco.cloud.databricks.com
    variables:
      catalog: deco_catalog
      schema: default
      source_catalog: samples
      source_schema: wanderbricks

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://fevm-deco.cloud.databricks.com
      # Use a stable shared deployment path for production artifacts.
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: deco_catalog
      schema: default
      source_catalog: samples
      source_schema: wanderbricks
    run_as:
      # Best practice for production is to run as a service principal instead of a personal user.
      service_principal_name: "00000000-1111-2222-3333-444444444444"
